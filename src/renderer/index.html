<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
                http-equiv="Content-Security-Policy"
                content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline';"
                />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SnapText</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
        <main class="min-h-screen p-6">
            <section
                    class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white/95 p-6 shadow-xl dark:border-slate-800 dark:bg-slate-900/95"
                    >
                    <p class="mb-2 text-[11px] uppercase tracking-[0.12em] text-slate-500 dark:text-slate-400">
                    macOS OCR utility
                    </p>

                <h1 class="text-3xl font-bold tracking-tight">SnapText</h1>

                <p class="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">
                Capture any region of the screen, scan it for text, and replace the clipboard with the
                recognized text.
                </p>

                <button
                        id="capture-button"
                        class="mt-5 w-full rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-wait disabled:opacity-70 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white"
                        >
                        Capture text
                </button>

                    <p id="shortcut-hint" class="mt-3 text-xs text-slate-500 dark:text-slate-400"></p>

                    <div class="mt-6 space-y-3">
                        <div class="grid grid-cols-[28px_1fr] gap-3">
                            <span
                                    class="grid h-7 w-7 place-items-center rounded-full bg-slate-200 text-sm font-bold dark:bg-slate-800"
                                    >1</span
                                >
                                <p class="pt-0.5 text-sm text-slate-600 dark:text-slate-300">
                                Click the button or use the shortcut.
                                </p>
                        </div>

                        <div class="grid grid-cols-[28px_1fr] gap-3">
                            <span
                                    class="grid h-7 w-7 place-items-center rounded-full bg-slate-200 text-sm font-bold dark:bg-slate-800"
                                    >2</span
                                >
                                <p class="pt-0.5 text-sm text-slate-600 dark:text-slate-300">
                                Drag over the text you want to scan.
                                </p>
                        </div>

                        <div class="grid grid-cols-[28px_1fr] gap-3">
                            <span
                                    class="grid h-7 w-7 place-items-center rounded-full bg-slate-200 text-sm font-bold dark:bg-slate-800"
                                    >3</span
                                >
                                <p class="pt-0.5 text-sm text-slate-600 dark:text-slate-300">
                                The image is deleted and the text goes to your clipboard.
                                </p>
                        </div>
                    </div>

                    <div
                            id="status"
                            class="mt-6 rounded-xl bg-indigo-50 px-4 py-3 text-sm text-indigo-900 dark:bg-slate-800 dark:text-slate-100"
                            >
                            Ready.
                    </div>

                        <label
                                for="preview"
                                class="mt-4 block text-xs font-medium uppercase tracking-wide text-slate-500 dark:text-slate-400"
                                >
                                Last recognized text
                        </label>

                            <textarea
                                    id="preview"
                                    readonly
                                    placeholder="Your scanned text will appear here."
                                    class="mt-2 min-h-[160px] w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none dark:border-slate-700 dark:bg-slate-950"
                                    ></textarea>
            </section>
        </main>

        <script src="./renderer.js"></script>
    </body>
</html>
